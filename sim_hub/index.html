<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>광학 시뮬레이션 허브</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-main: #0969da;
      --color-sub: #0e7490;
      --color-bg: #f6f8fa;
      --color-text: #0d1117;
      --color-divider: #d0d7de;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: "IBM Plex Sans KR", sans-serif;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 24px 16px;
      border-bottom: 1px solid var(--color-divider);
      background: #ffffff;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      color: var(--color-main);
    }

    header p {
      margin: 4px 0 0;
      font-size: 14px;
      color: var(--color-sub);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .card {
      display: block;
      padding: 16px;
      background: #ffffff;
      border: 1px solid var(--color-divider);
      border-radius: 6px;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      border-color: var(--color-main);
    }

    .card h2 {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 600;
      color: var(--color-main);
    }

    .card p {
      margin: 0;
      font-size: 14px;
      color: var(--color-text);
    }

    footer {
      padding: 16px;
      border-top: 1px solid var(--color-divider);
      text-align: center;
      font-size: 12px;
      color: var(--color-sub);
    }
  </style>
</head>
<body>
  <header>
    <h1>광학 시뮬레이션 허브</h1>
    <p>카드를 선택하면 시뮬레이션이 열립니다.</p>
  </header>

  <main>
    <div class="grid" id="sim-grid"></div>
  </main>

  <footer>v1.0.0 · 2026-06-16</footer>

  <script src="simulations.js"></script>
  <script>
    (function () {
      var grid = document.getElementById("sim-grid");
      simulations.forEach(function (sim) {
        var card = document.createElement("a");
        card.className = "card";
        card.href = sim.file;

        var title = document.createElement("h2");
        title.textContent = sim.title;

        var desc = document.createElement("p");
        desc.textContent = sim.desc;

        card.appendChild(title);
        card.appendChild(desc);
        grid.appendChild(card);
      });
    })();
  </script>
</body>
</html>
